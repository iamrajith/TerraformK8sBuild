---
- name: Setup Kubernetes Master Node
  hosts: master
  become: yes

  tasks:
  - name: Ensure ansible_user is populated from runtime flags
    set_fact:
        ansible_user: "{{ ansible_user | default(ansible_env.USER) }}"
  ## 1. System Preparation
  - name: Update and upgrade packages
    apt:
      update_cache: yes
      upgrade: dist
    ignore_errors: true

  - name: Install required dependencies
    apt:
      name:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg
        - lsb-release
      state: present

  - name: Disable swap
    command: swapoff -a

  - name: Remove swap entry from fstab
    replace:
      path: /etc/fstab
      regexp: '(^.*swap.*$)'
      replace: '# \1'

  ## 2. Kernel Modules and Sysctl
  - name: Load kernel modules
    copy:
      dest: /etc/modules-load.d/k8s.conf
      content: |
        overlay
        br_netfilter

  - name: Apply kernel modules
    modprobe:
      name: "{{ item }}"
    loop:
      - overlay
      - br_netfilter

  - name: Configure sysctl params
    copy:
      dest: /etc/sysctl.d/k8s.conf
      content: |
        net.bridge.bridge-nf-call-iptables  = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward                 = 1

  - name: Apply sysctl settings
    command: sysctl --system

  ## 3. Install Containerd
  - name: Install containerd
    apt:
      name: containerd
      state: present

  - name: Create containerd config directory
    file:
      path: /etc/containerd
      state: directory

  - name: Generate default containerd config
    command: containerd config default
    register: containerd_config

  - name: Save containerd config
    copy:
      dest: /etc/containerd/config.toml
      content: "{{ containerd_config.stdout }}"

  - name: Set SystemdCgroup = true
    replace:
      path: /etc/containerd/config.toml
      regexp: 'SystemdCgroup = false'
      replace: 'SystemdCgroup = true'

  - name: Restart and enable containerd
    systemd:
      name: containerd
      state: restarted
      enabled: yes

  ## 4. Install Kubernetes Components
  - name: Add Kubernetes apt key
    shell: curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key |   sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg

  - name: Add Kubernetes apt repo
    shell: echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /" | sudo tee /etc/apt/sources.list.d/kubernetes.list

  - name: Install kubelet, kubeadm, kubectl
    apt:
      name:
        - kubelet
        - kubeadm
        - kubectl
      state: present
      update_cache: yes

  - name: Hold kubelet, kubeadm, kubectl
    command: apt-mark hold kubelet kubeadm kubectl

  ## 5. Initialize Master Node
  - name: Initialize Kubernetes master
    command: >
      kubeadm init
      --apiserver-advertise-address=172.16.10.4
      --apiserver-cert-extra-sans=172.16.10.4
      --node-name=master
      --pod-network-cidr=192.168.0.0/24
    args:
      creates: /etc/kubernetes/admin.conf

  ## 6. Configure kubectl
  - name: Create kube config directory
    file:
      path: "/home/{{ ansible_user }}/.kube"
      state: directory

  - name: Copy admin.conf
    copy:
      src: /etc/kubernetes/admin.conf
      dest: "/home/{{ ansible_user }}/.kube/config"
      remote_src: yes

  - name: Set kube config ownership
    file:
      path: "/home/{{ ansible_user }}/.kube/config"
      owner: "{{ ansible_user_id }}"
      group: "{{ ansible_user_gid }}"

  ## 7. Install Calico Network Plugin
  - name: Install Calico
    command: kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.32.0/manifests/calico.yaml
    environment:
      KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

  ## 8. Deploy Test Application
  - name: Deploy nginx test app
    command: kubectl create deployment demo1 --image nginx --replicas 10
    environment:
      KUBECONFIG: "/home/{{ ansible_user }}/.kube/config"

  - name: Generate join command
    command: kubeadm token create --print-join-command
    register: join_command

  - name: Add kubectl completion to bashrc
    lineinfile:
     path: "/home/{{ ansible_user }}/.bashrc"
     line: 'source <(kubectl completion bash)'
     create: yes

  - name: Copy join command to local file
    local_action: copy content="{{ join_command.stdout_lines[0] }}" dest="/tmp/join-command.sh"
