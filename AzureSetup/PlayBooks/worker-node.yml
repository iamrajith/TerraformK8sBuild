---
- name: Setup Kubernetes Master Node
  hosts: worker
  become: yes

  tasks:

  ## 1. System Preparation
  - name: Update and upgrade packages
    apt:
      update_cache: yes
      upgrade: dist

  - name: Install required dependencies
    apt:
      name:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg
        - lsb-release
      state: present

  - name: Disable swap
    command: swapoff -a

  - name: Remove swap entry from fstab
    replace:
      path: /etc/fstab
      regexp: '(^.*swap.*$)'
      replace: '# \1'

  ## 2. Kernel Modules and Sysctl
  - name: Load kernel modules
    copy:
      dest: /etc/modules-load.d/k8s.conf
      content: |
        overlay
        br_netfilter

  - name: Apply kernel modules
    modprobe:
      name: "{{ item }}"
    loop:
      - overlay
      - br_netfilter

  - name: Configure sysctl params
    copy:
      dest: /etc/sysctl.d/k8s.conf
      content: |
        net.bridge.bridge-nf-call-iptables  = 1
        net.bridge.bridge-nf-call-ip6tables = 1
        net.ipv4.ip_forward                 = 1

  - name: Apply sysctl settings
    command: sysctl --system

  ## 3. Install Containerd
  - name: Install containerd
    apt:
      name: containerd
      state: present

  - name: Create containerd config directory
    file:
      path: /etc/containerd
      state: directory

  - name: Generate default containerd config
    command: containerd config default
    register: containerd_config

  - name: Save containerd config
    copy:
      dest: /etc/containerd/config.toml
      content: "{{ containerd_config.stdout }}"

  - name: Set SystemdCgroup = true
    replace:
      path: /etc/containerd/config.toml
      regexp: 'SystemdCgroup = false'
      replace: 'SystemdCgroup = true'

  - name: Restart and enable containerd
    systemd:
      name: containerd
      state: restarted
      enabled: yes

  ## 4. Install Kubernetes Components
  - name: Add Kubernetes apt key
    shell: curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.35/deb/Release.key |   sudo gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg

  - name: Add Kubernetes apt repo
    shell: echo "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.35/deb/ /" | sudo tee /etc/apt/sources.list.d/kubernetes.list

  - name: Install kubelet, kubeadm, kubectl
    apt:
      name:
        - kubelet
        - kubeadm
        - kubectl
      state: present
      update_cache: yes

  - name: Hold kubelet, kubeadm, kubectl
    command: apt-mark hold kubelet kubeadm kubectl
    # Join the nodes to the Kubernetes cluster using below code.
  - name: Copy the join command to server location
    copy: src=/tmp/join-command.sh dest=/tmp/join-command.sh mode=0777




  - name: Waits for port 6443 of any IP to close active connections, don't start checking for 10 seconds
    ansible.builtin.wait_for:
      host: 172.16.10.4
      port: 6443
      delay: 10

  - name: Join the node to cluster
    command: sh /tmp/join-command.sh